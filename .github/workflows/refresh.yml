name: Refresh (krim404 nachziehen)

# Loest taeglich ein Vercel-Rebuild aus. Beim Rebuild zieht build.py krim404s aktuelle
# Flasher-Seite frisch - so landen seine Updates ohne Zutun auf der Vercel-Seite.
# Voraussetzung: Repo-Secret VERCEL_DEPLOY_HOOK (Deploy-Hook-URL aus dem Vercel-Projekt).

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Vercel Deploy-Hook ausloesen
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "Kein VERCEL_DEPLOY_HOOK gesetzt - uebersprungen."; exit 0
          fi
          curl -fsSL -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" && echo "Rebuild angestossen."

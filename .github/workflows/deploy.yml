name: Build & Deploy (GitHub Pages)

# Baut die Seite aus krim404s aktuellem Flasher und veroeffentlicht auf GitHub Pages.
# - bei jedem Push
# - manuell ("Run workflow")
# - taeglich per Cron: zieht krim404s Updates automatisch nach
# Kostenlos, kein Hosting/Billing noetig.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Seite aus krim404s aktuellem Flasher bauen
        run: python3 build.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
